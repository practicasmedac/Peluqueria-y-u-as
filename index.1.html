<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Hace que la web sea responsive en móviles -->
    <title>StudioLux | Cortes</title> 
    <link rel="stylesheet" href="style.css"> <!-- Enlaza el archivo CSS externo para los estilos -->
</head>
<body>

    <!--  HEADER  -->
    <header>
                <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sekuya&display=swap" rel="stylesheet">
        <div class="logo">StudioLux</div> 
        <nav>
            <button class="nav-btn">Inicio</button>
            <button class="nav-btn">Servicios</button>
            <button class="nav-btn">Contacto</button>
        </nav>
    </header>
   
    <!-- CONTENIDO PRINCIPAL -->
    <main>
        
        <!-- IMAGEN PRINCIPAL -->
        <section class="seccion-imagen">
            <div class="placeholder-imagen">
                <img src="peluqueria1.jpg">
        </section>
        
        <!-- CORTES -->
        <section class="seccion-info">
            <h1>Cortes</h1>
            
            <!-- Organiza los cortes -->
            <div class="cortes-grid">
                
                <!-- CORTE 1 -->
                <div class="corte-item">
                    <div class="placeholder-img"></div>
                    <span>Corte</span> 
                </div>
                
                <!-- CORTE 2 -->
                <div class="corte-item">
                    <div class="placeholder-img"></div>
                    <span>Coloración</span>
                </div>
                
                <!-- CORTE 3 -->
                <div class="corte-item">
                    <div class="placeholder-img"></div>
                    <span>Tratamiento</span>
                </div>
                
            </div>
            
            <!-- BOTÓN AGENDAR CITA -->
            <div class="boton-cita">
                <button class="btn-agendar" >
                    Agendar Cita
                </button>
            </div>
            
        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>StudioLux</p>
    </footer>

</body>
</html>
